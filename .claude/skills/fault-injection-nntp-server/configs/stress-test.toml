# Aggressive fault injection for chaos/stress testing
# Enables ALL fault categories with higher probabilities
# WARNING: This will cause many failures - use for resilience testing only

[server]
port = 1190
max_connections = 5  # Lower limit for stress testing
greeting = "200 fault-nntp-server (CHAOS MODE)"

[faults.connection]
# Connection-level faults
eof_on_greeting_prob = 0.02
hang_on_connect_ms = 0
close_after_greeting = false
rst_mid_connection_prob = 0.05
close_after_commands = 0

[faults.response]
# Response format faults
malformed_status_prob = 0.15
invalid_code_prob = 0.10
truncate_prob = 0.08
missing_terminator_prob = 0.05
embedded_crlf_prob = 0.05
multiple_responses_prob = 0.03

[faults.encoding]
# Encoding faults
invalid_utf8_prob = 0.10
nul_bytes_prob = 0.08
wrong_line_endings_prob = 0.15
bom_prefix_prob = 0.05
latin1_prob = 0.05

[faults.timing]
# Timing faults
slow_drip_bytes_per_sec = 0  # Set to 500 for slow mode
freeze_mid_response_prob = 0.10
freeze_duration_ms = 3000
response_delay_ms = 50  # Small delay on every response

[faults.compression]
# Compression faults
corrupt_gzip_prob = 0.10
truncate_compressed_prob = 0.08
fake_marker_prob = 0.10
missing_marker_prob = 0.05
decompression_bomb_prob = 0.0  # Disabled by default - dangerous!
bomb_expanded_size = 10485760  # 10MB if enabled

[faults.multiline]
# Multiline parsing faults
lone_cr_prob = 0.10
mixed_line_endings_prob = 0.15
very_long_line_bytes = 0  # Set to 1048576 for 1MB lines
nul_in_body_prob = 0.08
double_terminator_prob = 0.05

[faults.article]
# Article-specific faults
wrong_message_id_prob = 0.10
missing_headers_prob = 0.05
duplicate_headers_prob = 0.10
yenc_corruption_prob = 0.10
crc_mismatch_prob = 0.10
