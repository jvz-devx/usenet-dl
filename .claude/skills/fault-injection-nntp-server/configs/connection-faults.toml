# Connection-level faults configuration
# Tests: F1-F8, E1-E2 from faults.md

[server]
port = 1190
max_connections = 10
greeting = "200 fault-nntp-server (connection faults mode)"

[faults.connection]
# F1: EOF on greeting (5% chance)
eof_on_greeting_prob = 0.05

# E1: Hang before greeting (occasionally hang for 5 seconds)
hang_on_connect_ms = 0  # Set to 5000 to enable

# F1: Close after greeting (3% chance)
close_after_greeting = false  # Set to true to enable

# F3: RST mid-connection (2% chance)
rst_mid_connection_prob = 0.02

# F8: Close after every 5 commands (set to 0 to disable)
close_after_commands = 0

[faults.response]
# B1-B8: Truncate responses mid-stream (5% chance)
truncate_prob = 0.05

# B1: Missing dot terminator on multiline (3% chance)
missing_terminator_prob = 0.03

[faults.timing]
# E2: Slow drip mode (0 = disabled, set to 100 for 100 bytes/sec)
slow_drip_bytes_per_sec = 0

# E3-E5: Freeze mid-response (5% chance)
freeze_mid_response_prob = 0.05
freeze_duration_ms = 5000

# General response delay
response_delay_ms = 0
